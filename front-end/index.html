<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGEW</title>
    <link rel="shortcut icon" href="img/favicon.ico.svg" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="tela-login" class="login-overlay">

    <div class="login-box">

        <div class="login-header">
            <span class="login-icon">📚</span>
            <h1>SGEW</h1>
            <p>Smart Global Education Web</p>
        </div>

        <div class="campo">
            <label for="login-usuario">Usuário</label>
            <input
                type="text"
                id="login-usuario"
                placeholder="Digite seu usuário"
                autocomplete="username"
            >
        </div>

        <div class="campo">
            <label for="login-senha">Senha</label>
            <input
                type="password"
                id="login-senha"
                placeholder="Digite sua senha"
                autocomplete="current-password"
            >
        </div>

        <p id="login-erro" class="login-erro hidden"></p>

        <button class="btn-login" onclick="tentarLogin()">Entrar</button>

    </div>

</div>

<div id="tela-sistema" class="container hidden">

    <aside class="sidebar">

        <h2>📚 Menu</h2>

        <button data-page="dashboard"  onclick="mostrar('dashboard')">Dashboard</button>
        <button data-page="alunos"     onclick="mostrar('alunos')">Alunos</button>
        <button data-page="turmas"     onclick="mostrar('turmas')">Turmas</button>
        <button data-page="matriculas" onclick="mostrar('matriculas')">Matrículas</button>
        <button data-page="mensagens"  onclick="mostrar('mensagens')">Mensagens</button>
        <button data-page="btn-logout" onclick="logout()">Sair</button>

    </aside>

    <main class="content">

        <section id="dashboard" class="page">
            <h1>Dashboard</h1>
            <div class="cards">
                <div class="card">
                    <h3>Alunos</h3>
                    <p id="total-alunos">0</p>
                </div>
                <div class="card">
                    <h3>Turmas</h3>
                    <p id="total-turmas">0</p>
                </div>
                <div class="card">
                    <h3>Matrículas</h3>
                    <p id="total-matriculas">0</p>
                </div>
                <div class="card">
                    <h3>Mensagens</h3>
                    <p id="total-mensagens">0</p>
                </div>
            </div>
        </section>

        <section id="alunos" class="page hidden">
            <h1>Alunos</h1>
            <form id="form-aluno">
                <div class="campo">
                    <label for="nome-aluno">Nome</label>
                    <input type="text" id="nome-aluno" placeholder="Nome" required>
                </div>
                <div class="campo">
                    <label for="email-aluno">Email</label>
                    <input type="email" id="email-aluno" placeholder="Email" required>
                </div>
                <div class="campo">
                    <label for="data_nascimento-aluno">Data de nascimento</label>
                    <input type="date" id="data_nascimento-aluno" required>
                </div>
                <button type="submit">Cadastrar</button>
            </form>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Email</th>
                        <th>Idade</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-alunos"></tbody>
            </table>
        </section>

        <section id="turmas" class="page hidden">
            <h1>Turmas</h1>
            <form id="form-turma">
                <div class="campo">
                    <label for="nome-turma">Nome da turma</label>
                    <input type="text" id="nome-turma" placeholder="Nome da turma" required>
                </div>
                <div class="campo">
                    <label for="turno-turma">Turno</label>
                    <input type="text" id="turno-turma" placeholder="Turno" required>
                </div>
                <div class="campo">
                    <label for="ano-turma">Ano</label>
                    <input type="number" id="ano-turma" placeholder="Ano" required>
                </div>
                <button type="submit">Cadastrar</button>
            </form>
            <div id="lista-turmas" class="cards"></div>
        </section>

        <section id="matriculas" class="page hidden">
            <h1>Matrículas</h1>
            <form id="form-matricula">
                <div class="campo">
                    <label for="aluno-select">Aluno</label>
                    <select id="aluno-select"></select>
                </div>
                <div class="campo">
                    <label for="turma-select">Turma</label>
                    <select id="turma-select"></select>
                </div>
                <button type="submit">Matricular</button>
            </form>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Aluno</th>
                        <th>Turma</th>
                        <th>Data</th>
                    </tr>
                </thead>
                <tbody id="tabela-matriculas"></tbody>
            </table>
        </section>

        <section id="mensagens" class="page hidden">
            <h1>Mensagens</h1>

            <div id="feedback-mensagem" class="feedback hidden"></div>

            <form id="form-mensagem">
                <div class="campo">
                    <label for="nome-msg">Nome</label>
                    <input type="text" id="nome-msg" placeholder="Nome" required>
                </div>
                <div class="campo">
                    <label for="email-msg">Email</label>
                    <input type="email" id="email-msg" placeholder="Email" required>
                </div>
                <div class="campo">
                    <label for="assunto-msg">Assunto</label>
                    <input type="text" id="assunto-msg" placeholder="Assunto" required>
                </div>
                <div class="campo campo-full">
                    <label for="mensagem-msg">Mensagem</label>
                    <textarea id="mensagem-msg" placeholder="Digite sua mensagem..." required></textarea>
                </div>
                <button type="submit">Enviar</button>
            </form>

            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Assunto</th>
                        <th>Data</th>
                    </tr>
                </thead>
                <tbody id="tabela-mensagens"></tbody>
            </table>
        </section>

    </main>

</div>

<div id="modal-editar-aluno" class="modal-overlay hidden">
    <div class="modal-box">
        <button class="modal-fechar" onclick="fecharModalEditor()">✕</button>

        <h2>Editar Aluno</h2>

        <form id="form-editar-aluno">
            <input type="hidden" id="modal-editar-id">

            <div class="campo">
                <label for="modal-editar-nome">Nome</label>
                <input type="text" id="modal-editar-nome" required>

            </div>

            <div class="campo">
                <label for="modal-editar-email">Email</label>
                <input type="email" id="modal-editar-email" required>
            </div>

            <div class="campo">
                <label for="modal-edital-nascimento">Data de nascimento</label>
                <input type="date" id="modal-editar-nascimento" required>
            </div>

            <button type="submit">Salvar alterações</button>
        </form>
    </div>
</div>


<script src="js/app.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/alunos.js"></script>
<script src="js/turmas.js"></script>
<script src="js/matriculas.js"></script>
<script src="js/mensagens.js"></script>
<script src="js/login.js"></script>

</body>
</html>
