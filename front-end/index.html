<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>SGEW</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <aside class="sidebar">

        <h2>📚 Escola</h2>

        <button onclick="mostrar('dashboard')">Dashboard</button>
        <button onclick="mostrar('alunos')">Alunos</button>
        <button onclick="mostrar('turmas')">Turmas</button>
        <button onclick="mostrar('matriculas')">Matrículas</button>
        <button onclick="mostrar('mensagens')">Mensagens</button>

    </aside>

    <main class="content">

        <!-- DASHBOARD -->
        <section id="dashboard" class="page">

            <h1>Dashboard</h1>

            <div class="cards">

                <div class="card">
                    <h3>Alunos</h3>
                    <p id="total-alunos">0</p>
                </div>

                <div class="card">
                    <h3>Turmas</h3>
                    <p id="total-turmas">0</p>
                </div>

                <div class="card">
                    <h3>Matrículas</h3>
                    <p id="total-matriculas">0</p>
                </div>

                <div class="card">
                    <h3>Mensagens</h3>
                    <p id="total-mensagens">0</p>
                </div>

            </div>

        </section>
            <section id="alunos" class="page hidden">

    <h1>Alunos</h1>

    <form id="form-aluno">

        <input
            type="text"
            id="nome-aluno"
            placeholder="Nome"
            required
        >

        <input
            type="email"
            id="email-aluno"
            placeholder="Email"
            required
        >

        <input
            type="date"
            id="data_nascimento-aluno"
            placeholder="Data de nascimento"
            required
        >

        <button type="submit">
            Cadastrar
        </button>

    </form>

    <table>

    <thead>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Email</th>
            <th>Idade</th>
            <th>Ações</th>
        </tr>
    </thead>

    <tbody id="tabela-alunos">

    </tbody>

</table>

</section>

<section id="turmas" class="page hidden">

    <h1>Turmas</h1>

    <form id="form-turma">

        <input
            type="text"
            id="nome-turma"
            placeholder="Nome da turma"
            required
        >

        <input
            type="text"
            id="turno-turma"
            placeholder="Turno"
            required
        >

        <input
            type="number"
            id="ano-turma"
            placeholder="Ano"
            required
        >

        <button type="submit">
            Cadastrar
        </button>

    </form>

    <div id="lista-turmas"></div>

</section>

<section id="matriculas" class="page hidden">

    <h1>Matrículas</h1>

    <form id="form-matricula">

        <select id="aluno-select">

        </select>

        <select id="turma-select">

        </select>

        <button type="submit">

            Matricular

        </button>

    </form>

    <table>

    <thead>

        <tr>

            <th>ID</th>
            <th>Aluno</th>
            <th>Turma</th>
            <th>Data</th>

        </tr>

    </thead>

    <tbody id="tabela-matriculas">

    </tbody>

</table>

    <div id="lista-matriculas"></div>

</section>



<section id="mensagens" class="page hidden">

    <h1>Mensagens</h1>

    <form id="form-mensagem">

        <input
            type="text"
            id="nome-msg"
            placeholder="Nome"
            required
        >

        <input
            type="email"
            id="email-msg"
            placeholder="Email"
            required
        >

        <input
            type="text"
            id="assunto-msg"
            placeholder="Assunto"
            required
        >


        <button type="submit">
            Enviar
        </button>

    </form>

            <textarea class="text"
            id="mensagem-msg"
            placeholder="Mensagem"
            required
        ></textarea>

        <table>

    <thead>

        <tr>

            <th>Nome</th>
            <th>Assunto</th>
            <th>Data</th>

        </tr>

    </thead>

    <tbody id="tabela-mensagens">

    </tbody>

</table>


    <div id="lista-mensagens"></div>

</section>
        </main>

    </div>

    <script src="js/dashboard.js"></script>

    <script src="js/app.js"></script>

    <script src="js/alunos.js"></script>

    <script src="js/turmas.js"></script>

    <script src="js/matriculas.js"></script>

    <script src="js/mensagens.js"></script>


</body>

</html>
