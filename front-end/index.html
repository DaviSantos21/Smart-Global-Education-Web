<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>SGEW</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">

        <aside class="sidebar">

            <h2>SMART GLOBAL EDUCATION WEB</h2>

            <button onclick="mostrarPagina('alunos')">
                Alunos
            </button>

            <button onclick="mostrarPagina('turmas')">
                Turmas
            </button>

            <button onclick="mostrarPagina('matriculas')">
                Matrículas
            </button>

            <button onclick="mostrarPagina('mensagens')">
                Mensagens
            </button>

        </aside>

        <main class="content">

            <section id="alunos">

    <h1>Alunos</h1>

    <form id="form-aluno">

        <input
            type="text"
            id="nome-aluno"
            placeholder="Nome"
            required
        >

        <input
            type="email"
            id="email-aluno"
            placeholder="Email"
            required
        >

        <input
            type="date"
            id="data_nascimento-aluno"
            placeholder="Data de nascimento"
            required
        >

        <button type="submit">
            Cadastrar
        </button>

    </form>

    <div id="lista-alunos"></div>

</section>

<section id="turmas" style="display:none">

    <h1>Turmas</h1>

    <form id="form-turma">

        <input
            type="text"
            id="nome-turma"
            placeholder="Nome da turma"
            required
        >

        <input
            type="text"
            id="turno-turma"
            placeholder="Turno"
            required
        >

        <input
            type="number"
            id="ano-turma"
            placeholder="Ano"
            required
        >

        <button type="submit">
            Cadastrar
        </button>

    </form>

    <div id="lista-turmas"></div>

</section>

<section id="matriculas" style="display:none">

    <h1>Matrículas</h1>

    <form id="form-matricula">

        <select id="aluno-select">

        </select>

        <select id="turma-select">

        </select>

        <button type="submit">

            Matricular

        </button>

    </form>

    <div id="lista-matriculas"></div>

</section>

<section id="mensagens" style="display:none">

    <h1>Mensagens</h1>

    <form id="form-mensagem">

        <input
            type="text"
            id="nome-msg"
            placeholder="Nome"
            required
        >

        <input
            type="email"
            id="email-msg"
            placeholder="Email"
            required
        >

        <input
            type="text"
            id="assunto-msg"
            placeholder="Assunto"
            required
        >


        <button type="submit">
            Enviar
        </button>

    </form>

            <textarea class="text"
            id="mensagem-msg"
            placeholder="Mensagem"
            required
        ></textarea>


    <div id="lista-mensagens"></div>

</section>
        </main>

    </div>

    <script src="js/app.js"></script>

    <script src="js/alunos.js"></script>

    <script src="js/turmas.js"></script>

    <script src="js/matriculas.js"></script>

    <script src="js/mensagens.js"></script>

</body>

</html>
